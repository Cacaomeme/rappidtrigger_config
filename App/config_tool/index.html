<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Trigger Keyboard - Config Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface-hover: #22222e;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d68f;
            --warning: #f0a030;
            --danger: #ff6b6b;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app {
            max-width: 820px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Connection bar */
        .connection-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px rgba(0, 214, 143, 0.5);
        }

        .status-text {
            flex: 1;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-text.connected {
            color: var(--success);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #7c6cf7;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--surface-hover);
            border-color: var(--accent);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 107, 107, 0.1);
        }

        .btn-success {
            background: transparent;
            color: var(--success);
            border: 1px solid rgba(0, 214, 143, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            background: rgba(0, 214, 143, 0.1);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* Confirm bar */
        .confirm-bar {
            display: none;
            align-items: center;
            gap: 12px;
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: var(--radius);
            padding: 12px 18px;
            margin-bottom: 16px;
            animation: slideIn 0.2s ease-out;
        }

        .confirm-bar.show {
            display: flex;
        }

        .confirm-bar .confirm-msg {
            flex: 1;
            font-size: 0.85rem;
            color: var(--danger);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Key grid */
        .key-grid {
            display: grid;
            gap: 8px;
        }

        .key-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            display: grid;
            grid-template-columns: 80px 1fr 70px;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .key-card:hover {
            border-color: rgba(108, 92, 231, 0.4);
        }

        .key-card.modified {
            border-color: var(--warning);
            box-shadow: 0 0 0 1px rgba(240, 160, 48, 0.15);
        }

        .key-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
        }

        .key-name .key-idx {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 4px;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 6px var(--accent-glow);
        }

        /* Number input */
        input[type="number"] {
            width: 65px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            font-variant-numeric: tabular-nums;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        /* Toast / log */
        .log-area {
            margin-top: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }

        .log-entry {
            padding: 2px 0;
        }

        .log-entry.success {
            color: var(--success);
        }

        .log-entry.error {
            color: var(--danger);
        }

        .log-entry.info {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .key-card {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .toolbar {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1>⚡ Rapid Trigger Config</h1>
            <p>WebHID Keyboard Configuration Tool</p>
        </div>

        <div class="connection-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">未接続</span>
            <button class="btn btn-primary" id="btnConnect" onclick="toggleConnect()">接続</button>
        </div>

        <div class="toolbar">
            <button class="btn btn-outline" id="btnRead" disabled onclick="readAllSensitivity()">📖 読み込み</button>
            <button class="btn btn-outline" id="btnWrite" disabled onclick="writeAllSensitivity()">📝 書き込み</button>
            <button class="btn btn-success" id="btnSave" disabled onclick="saveToFlash()">💾 Flashに保存</button>
            <button class="btn btn-danger" id="btnReset" disabled onclick="showResetConfirm()">🔄 初期化</button>
        </div>

        <!-- Inline confirmation bar (replaces confirm() dialog) -->
        <div class="confirm-bar" id="confirmBar">
            <span class="confirm-msg">⚠ 全キーの感度を初期値(50)にリセットします。よろしいですか？</span>
            <button class="btn btn-danger btn-sm" onclick="doResetDefaults()">実行</button>
            <button class="btn btn-outline btn-sm" onclick="hideResetConfirm()">キャンセル</button>
        </div>

        <div class="key-grid" id="keyGrid"></div>

        <div class="log-area" id="logArea"></div>
    </div>

    <script>
        // ===== Config =====
        const VID = 0x0483;
        const PID = 0x5750;
        const CMD = {
            SET_SENSITIVITY: 0x01,
            GET_SENSITIVITY: 0x02,
            SAVE_TO_FLASH: 0x10,
            RESET_DEFAULTS: 0x11,
            GET_KEY_COUNT: 0x20,
        };
        const RESP = { OK: 0x00, ERROR: 0x01, INVALID: 0x02 };

        // Key names (MUX1 then MUX2, matching nkro.cpp registration order)
        const KEY_NAMES = [
            'KP 0', 'KP .', 'KP Enter', 'KP 3', 'KP 2', 'KP 1', 'KP 6', 'KP 5', 'KP 4',
            'KP +', 'KP 9', 'KP 8', 'KP 7', 'KP -', 'KP *', 'KP /', 'NumLock'
        ];

        let device = null;
        let keyCount = KEY_NAMES.length;
        let originalValues = new Array(keyCount).fill(50);
        let currentValues = new Array(keyCount).fill(50);

        // ===== UI Setup =====
        function buildKeyGrid() {
            const grid = document.getElementById('keyGrid');
            grid.innerHTML = '';
            for (let i = 0; i < keyCount; i++) {
                const card = document.createElement('div');
                card.className = 'key-card';
                card.id = `key-${i}`;
                card.innerHTML = `
                <div class="key-name">${KEY_NAMES[i] || 'Key ' + i}<span class="key-idx">#${i}</span></div>
                <div class="slider-wrap">
                    <input type="range" min="1" max="1000" value="${currentValues[i]}"
                           id="slider-${i}" oninput="onSliderChange(${i}, this.value)">
                </div>
                <input type="number" min="1" max="1000" value="${currentValues[i]}"
                       id="num-${i}" onchange="onNumberChange(${i}, this.value)"
                       onkeydown="if(event.key==='Enter'){this.blur();}">
            `;
                grid.appendChild(card);
            }
        }

        function onSliderChange(idx, val) {
            val = parseInt(val);
            if (isNaN(val)) return;
            val = Math.max(1, Math.min(1000, val));
            currentValues[idx] = val;
            document.getElementById(`num-${idx}`).value = val;
            updateModified(idx);
        }

        function onNumberChange(idx, val) {
            val = parseInt(val);
            if (isNaN(val)) {
                // Revert to current value
                document.getElementById(`num-${idx}`).value = currentValues[idx];
                return;
            }
            val = Math.max(1, Math.min(1000, val));
            currentValues[idx] = val;
            document.getElementById(`slider-${idx}`).value = val;
            document.getElementById(`num-${idx}`).value = val;
            updateModified(idx);
        }

        function updateModified(idx) {
            const card = document.getElementById(`key-${idx}`);
            if (currentValues[idx] !== originalValues[idx]) {
                card.classList.add('modified');
            } else {
                card.classList.remove('modified');
            }
        }

        function updateUI(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('btnConnect');

            dot.classList.toggle('connected', connected);
            text.classList.toggle('connected', connected);
            text.textContent = connected ? '接続済み' : '未接続';
            btn.textContent = connected ? '切断' : '接続';

            document.getElementById('btnRead').disabled = !connected;
            document.getElementById('btnWrite').disabled = !connected;
            document.getElementById('btnSave').disabled = !connected;
            document.getElementById('btnReset').disabled = !connected;
        }

        function log(msg, type = '') {
            const area = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            area.appendChild(entry);
            area.scrollTop = area.scrollHeight;
        }

        // ===== Reset Confirm UI =====
        function showResetConfirm() {
            log('初期化ボタンが押されました', 'info');
            document.getElementById('confirmBar').classList.add('show');
        }
        function hideResetConfirm() {
            document.getElementById('confirmBar').classList.remove('show');
        }

        // ===== WebHID =====
        async function toggleConnect() {
            if (device) {
                await disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            try {
                const devices = await navigator.hid.requestDevice({
                    filters: [{ vendorId: VID, productId: PID }]
                });
                if (devices.length === 0) {
                    log('デバイスが選択されませんでした', 'error');
                    return;
                }
                device = devices[0];
                await device.open();
                log(`接続: ${device.productName || 'HID Device'}`, 'success');
                updateUI(true);

                // 接続時に自動読み込み
                await readAllSensitivity();
            } catch (e) {
                log(`接続エラー: ${e.message}`, 'error');
                device = null;
            }
        }

        async function disconnect() {
            if (device) {
                await device.close();
                log('切断しました', 'info');
                device = null;
                updateUI(false);
            }
        }

        async function sendFeatureReport(data) {
            if (!device || !device.opened) throw new Error('デバイス未接続');
            const buf = new Uint8Array(32);
            for (let i = 0; i < Math.min(data.length, 32); i++) buf[i] = data[i];
            await device.sendFeatureReport(0, buf);
        }

        async function receiveFeatureReport() {
            if (!device || !device.opened) throw new Error('デバイス未接続');
            await new Promise(r => setTimeout(r, 50));
            const result = await device.receiveFeatureReport(0);
            return new Uint8Array(result.buffer);
        }

        // ===== Commands =====
        async function readAllSensitivity() {
            try {
                log('感度を読み込み中...', 'info');
                await sendFeatureReport([CMD.GET_SENSITIVITY, 0xFF]);
                const resp = await receiveFeatureReport();

                if (resp[1] !== RESP.OK) {
                    log(`読み込みエラー (status: ${resp[1]})`, 'error');
                    return;
                }

                for (let i = 0; i < keyCount && i < 15; i++) {
                    const val = resp[2 + i * 2] | (resp[2 + i * 2 + 1] << 8);
                    if (val >= 1 && val <= 4095) {
                        currentValues[i] = val;
                        originalValues[i] = val;
                    }
                }

                // Handle keys 15-16 with individual reads
                for (let i = 15; i < keyCount; i++) {
                    await sendFeatureReport([CMD.GET_SENSITIVITY, i]);
                    const r = await receiveFeatureReport();
                    if (r[1] === RESP.OK) {
                        const val = r[2] | (r[3] << 8);
                        if (val >= 1 && val <= 4095) {
                            currentValues[i] = val;
                            originalValues[i] = val;
                        }
                    }
                }

                buildKeyGrid();
                log(`読み込み完了 (${keyCount}キー)`, 'success');
            } catch (e) {
                log(`読み込みエラー: ${e.message}`, 'error');
            }
        }

        async function writeAllSensitivity() {
            try {
                let count = 0;
                for (let i = 0; i < keyCount; i++) {
                    if (currentValues[i] !== originalValues[i]) {
                        const val = currentValues[i];
                        await sendFeatureReport([
                            CMD.SET_SENSITIVITY, i,
                            val & 0xFF, (val >> 8) & 0xFF
                        ]);
                        const resp = await receiveFeatureReport();
                        if (resp[1] !== RESP.OK) {
                            log(`Key ${i} 書き込みエラー (status: ${resp[1]})`, 'error');
                            continue;
                        }
                        originalValues[i] = val;
                        const card = document.getElementById(`key-${i}`);
                        if (card) card.classList.remove('modified');
                        count++;
                    }
                }
                if (count === 0) {
                    log('変更なし（RAMへの書き込みは不要です）', 'info');
                } else {
                    log(`${count}キーの感度をRAMに書き込みました`, 'success');
                }
            } catch (e) {
                log(`書き込みエラー: ${e.message}`, 'error');
            }
        }

        async function saveToFlash() {
            try {
                await writeAllSensitivity();

                log('Flashに保存中...', 'info');
                await sendFeatureReport([CMD.SAVE_TO_FLASH]);
                const resp = await receiveFeatureReport();

                if (resp[1] === RESP.OK) {
                    log('Flashに保存しました ✓', 'success');
                } else {
                    log(`Flash保存エラー (status: ${resp[1]}, flash_status: ${resp[2]})`, 'error');
                }
            } catch (e) {
                log(`Flash保存エラー: ${e.message}`, 'error');
            }
        }

        async function doResetDefaults() {
            hideResetConfirm();
            try {
                log('初期化中...', 'info');
                await sendFeatureReport([CMD.RESET_DEFAULTS]);
                const resp = await receiveFeatureReport();

                if (resp[1] === RESP.OK) {
                    log('全キーを初期値にリセットしました', 'success');
                    await readAllSensitivity();
                } else {
                    log(`リセットエラー (status: ${resp[1]})`, 'error');
                }
            } catch (e) {
                log(`リセットエラー: ${e.message}`, 'error');
            }
        }

        // ===== Init =====
        buildKeyGrid();

        // Handle device disconnect
        if (navigator.hid) {
            navigator.hid.addEventListener('disconnect', (e) => {
                if (device && e.device === device) {
                    device = null;
                    updateUI(false);
                    log('デバイスが切断されました', 'error');
                }
            });
        }
    </script>
</body>

</html>
